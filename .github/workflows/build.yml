 name: Build CFnat-Windows-GUI                                                                                                                                                                                                              
                                                                                                                                                                                                                                                
     on:                                                                                                                                                                                                                                        
       push:                                                                                                                                                                                                                                    
         branches: [ master ]                                                                                                                                                                                                                   
       pull_request:                                                                                                                                                                                                                            
         branches: [ master ]                                                                                                                                                                                                                   
       workflow_dispatch:                                                                                                                                                                                                                       
                                                                                                                                                                                                                                                
     permissions:                                                                                                                                                                                                                               
       contents: read                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                
     jobs:                                                                                                                                                                                                                                      
       build:                                                                                                                                                                                                                                   
         name: Build (${{ matrix.configuration }})                                                                                                                                                                                              
         runs-on: windows-latest                                                                                                                                                                                                                
         strategy:                                                                                                                                                                                                                              
           matrix:                                                                                                                                                                                                                              
             configuration: [Release]                                                                                                                                                                                                           
                                                                                                                                                                                                                                                
         steps:                                                                                                                                                                                                                                 
           - name: Checkout                                                                                                                                                                                                                     
             uses: actions/checkout@v4                                                                                                                                                                                                          
                                                                                                                                                                                                                                                
           - name: Setup MSBuild                                                                                                                                                                                                                
             uses: microsoft/setup-msbuild@v2                                                                                                                                                                                                   
                                                                                                                                                                                                                                                
           - name: Restore NuGet Packages                                                                                                                                                                                                       
             run: |                                                                                                                                                                                                                             
               nuget restore cfnat.win.gui.sln                                                                                                                                                                                                  
                                                                                                                                                                                                                                                
           - name: Build                                                                                                                                                                                                                        
             run: |                                                                                                                                                                                                                             
               msbuild cfnat.win.gui.sln                                                                                                                                                                                                        
                 /p:Configuration=${{ matrix.configuration }}                                                                                                                                                                                   
                 /p:Platform=AnyCPU                                                                                                                                                                                                             
                 /p:RestorePackages=true                                                                                                                                                                                                        
                 /p:RestorePackagesConfig=true                                                                                                                                                                                                  
                 /nologo                                                                                                                                                                                                                        
                 /verbosity:minimal                                                                                                                                                                                                             
                                                                                                                                                                                                                                                
           - name: Upload Build Artifacts                                                                                                                                                                                                       
             uses: actions/upload-artifact@v4                                                                                                                                                                                                   
             with:                                                                                                                                                                                                                              
               name: CFnat-Windows-GUI-${{ matrix.configuration }}                                                                                                                                                                              
               path: |                                                                                                                                                                                                                          
                 bin/${{ matrix.configuration }}/                                                                                                                                                                                               
               retention-days: 7  
